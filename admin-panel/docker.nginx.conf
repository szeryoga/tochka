server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /admin {
    return 301 /admin/;
  }

  location /admin/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location /admin/ {
    rewrite ^/admin/(.*)$ /$1 break;
    try_files $uri $uri/ /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
