server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /app {
    return 301 /app/;
  }

  location /app/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location /app/ {
    rewrite ^/app/(.*)$ /$1 break;
    try_files $uri $uri/ /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
