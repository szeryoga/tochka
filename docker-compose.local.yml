services:
  backend:
    environment:
      CORS_ORIGINS: http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:3001,http://localhost:3001
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      args:
        VITE_API_BASE: http://127.0.0.1:8000/api
        VITE_APP_BASE: /
    ports:
      - "127.0.0.1:3000:80"

  admin-panel:
    build:
      args:
        VITE_API_BASE: http://127.0.0.1:8000/api
        VITE_ADMIN_BASE: /
    ports:
      - "127.0.0.1:3001:80"
